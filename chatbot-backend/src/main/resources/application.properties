spring.application.name=chatbot-backend
server.port=${SERVER_PORT:8080}

# ── LM Studio ────────────────────────────────────────────────────────────────
spring.ai.openai.api-key=${LM_STUDIO_API_KEY:lm-studio}
spring.ai.openai.base-url=${LM_STUDIO_BASE_URL:http://localhost:1234}
spring.ai.openai.chat.options.model=${LM_STUDIO_CHAT_MODEL:qwen2.5-3b-instruct}
spring.ai.openai.embedding.options.model=${LM_STUDIO_EMBEDDING_MODEL:text-embedding-nomic-embed-text-v1.5}

# ── Upload ────────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# ── Tika ──────────────────────────────────────────────────────────────────────
app.tika.server-url=${TIKA_SERVER_URL:http://localhost:9998}

# ── Chroma ───────────────────────────────────────────────────────────────────
app.chroma.base-url=${CHROMA_BASE_URL:http://localhost:8000}
app.chroma.collection-name=${CHROMA_COLLECTION:documents}
app.chroma.connect-timeout-ms=${CHROMA_CONNECT_TIMEOUT:5000}
app.chroma.read-timeout-ms=${CHROMA_READ_TIMEOUT:10000}

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://192.168.2.81:5173,http://localhost:4173

# ── Rate limiting ─────────────────────────────────────────────────────────────
app.rate-limit.chat.capacity=${RATE_LIMIT_CHAT_CAPACITY:20}
app.rate-limit.chat.refill-per-minute=${RATE_LIMIT_CHAT_REFILL:20}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.chatbot=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.ai=WARN

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ── Chat / RAG tuning ────────────────────────────────────────────────────────
app.chat.max-tokens=${CHAT_MAX_TOKENS:600}
app.chat.max-tokens-simple=${CHAT_MAX_TOKENS_SIMPLE:150}
app.chat.message-max-length=${CHAT_MESSAGE_MAX_LENGTH:2000}
app.rag.top-k=${RAG_TOP_K:4}
app.rag.similarity-threshold=${RAG_SIMILARITY_THRESHOLD:0.38}
app.rag.chunk-size=${RAG_CHUNK_SIZE:500}
app.rag.chunk-overlap=${RAG_CHUNK_OVERLAP:60}
app.rag.rerank-top-n=${RAG_RERANK_TOP_N:3}

# Pattern logging con requestId dall'MDC
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] [%X{requestId:-no-id}] %-5level %logger{36} - %msg%n